name: Build and Push Docker image

on:
  push:
    branches:
      - main
    paths:
      - 'basyx-dotnet-tests/**'
      - '.github/workflows/docker-image.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run Unit Tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x' # oder passende Version

      - name: Restore dependencies
        run: dotnet restore

      - name: Run tests
        run: dotnet test --no-build --verbosity normal

  build-docker-image:
    runs-on: ubuntu-latest
    needs: test 
    name: Build and Push Docker image

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./basyx-dotnet-applications/BaSyx.AASX.SM.Server.Http.App
          file: ./basyx-dotnet-applications/BaSyx.AASX.SM.Server.Http.App/Dockerfile
          push: true
          tags: danielkleinemag/fluid-basyx-dotnet-aasx-server:latest
