trigger:
  branches:
    include:
    - main

parameters:
  - name: customVersion
    type: string
    default: '2.1.0'

variables:
  # solution: '**/*.sln'
  # buildPlatform: 'Any CPU'
  buildConfiguration: 'Release'
  feedProject: 'FACTORY-Orchestration-Platform' # Azure DevOps project name
  feedName: 'BaSyx-NET-SDK-Packages' # Azure Artifacts feed name

stages:
  - stage: SDK
    displayName: Pack and publish SDK
    jobs:
    - job: SDK
      pool:
        vmImage: 'windows-latest'
      steps:
        - checkout: self
          fetchDepth: 0

        - task: NuGetToolInstaller@1
          inputs:
            checkLatest: true

        - task: PowerShell@2
          name: ComputeVersion
          displayName: Compute package version
          env:
            CUSTOM_VERSION: ${{ parameters.customVersion }}
          inputs:
            targetType: 'inline'
            script: |
              $custom = $env:CUSTOM_VERSION
              if (-not [string]::IsNullOrWhiteSpace($custom)) {
              Write-Host "Using custom version: $custom"
              # Make it available to later steps in this job and as an output for other jobs
              Write-Host "##vso[task.setvariable variable=PackageVersion;isOutput=true]$custom"
              exit 0
              }

              $propsPath = Join-Path "$(Build.SourcesDirectory)" "Directory.Build.props"
              if (!(Test-Path $propsPath)) {
              Write-Error "Directory.Build.props not found at $propsPath. Add <VersionPrefix>x.y.z</VersionPrefix>."
              exit 1
              }

              [xml]$xml = Get-Content -Raw $propsPath
              $node = $xml.SelectSingleNode('//VersionPrefix')
              if ($null -eq $node) {
              Write-Error "VersionPrefix not found in Directory.Build.props."
              exit 1
              }
              $base = $node.InnerText.Trim()
              Write-Host "Base VersionPrefix: $base"

              $parts = $base.Split('.')
              if ($parts.Length -lt 3) { Write-Error "VersionPrefix must be Major.Minor.Patch"; exit 1 }
              $major = [int]$parts[0]
              $minor = [int]$parts[1] + 1
              $patch = 0
              $computed = "$major.$minor.$patch"
              Write-Host "Computed bumped version: $computed"

              # Make it available to later steps in this job and as an output for other jobs
              Write-Host "##vso[task.setvariable variable=PackageVersion;isOutput=true]$computed"

        - task: NuGetAuthenticate@1
          displayName: Authenticate to Azure Artifacts

        - task: DotNetCoreCLI@2
          displayName: Restore SDK
          inputs:
            command: 'restore'
            projects: 'basyx-dotnet-sdk/**/*.csproj'

        - task: DotNetCoreCLI@2
          displayName: Build SDK
          inputs:
            command: 'build'
            projects: 'basyx-dotnet-sdk/**/*.csproj'
            arguments: '--configuration $(buildConfiguration)'

        - task: DotNetCoreCLI@2
          displayName: Pack SDK
          inputs:
            command: 'pack'
            packagesToPack: 'basyx-dotnet-sdk/**/*.csproj'
            arguments: '--no-build --include-source --include-symbols --configuration $(buildConfiguration) /p:Version=$(PackageVersion)'
            packDirectory: '$(Build.ArtifactStagingDirectory)/packages/sdk'

        - task: NuGetCommand@2
          displayName: Push SDK packages to internal feed
          inputs:
            command: 'push'
            packagesToPush: '$(Build.ArtifactStagingDirectory)/packages/sdk/*.nupkg'
            publishVstsFeed: '$(feedProject)/$(feedName)'
            allowPackageConflicts: true
    
  - stage: Components
    displayName: Pack and publish Components
    dependsOn: SDK
    variables:
      PackageVersionFromSDK: $[ stageDependencies.SDK.BuildSDK.outputs['ComputeVersion.PackageVersion'] ]
    jobs:
    - job: Components
      displayName: Build and pack Components
      pool:
        vmImage: 'windows-latest'
      steps:
        - checkout: self
          fetchDepth: 0

        - task: NuGetToolInstaller@1
          inputs:
            checkLatest: true
        - task: NuGetAuthenticate@1
          displayName: Authenticate to Azure Artifacts

        - task: DotNetCoreCLI@2
          displayName: Restore Components (from internal feed)
          inputs:
            command: 'restore'
            projects: 'basyx-dotnet-components/**/*.csproj'

        - task: DotNetCoreCLI@2
          displayName: Build Components
          inputs:
            command: 'build'
            projects: 'basyx-dotnet-components/**/*.csproj'
            arguments: '--configuration $(buildConfiguration)'

        - task: DotNetCoreCLI@2
          displayName: Pack Components
          inputs:
            command: 'pack'
            packagesToPack: 'basyx-dotnet-components/**/*.csproj'
            arguments: '--no-build --include-source --include-symbols --configuration $(buildConfiguration) /p:Version=$(PackageVersionFromSDK)'
            packDirectory: '$(Build.ArtifactStagingDirectory)/packages/components'

        - task: NuGetCommand@2
          displayName: Push Components packages to internal feed
          inputs:
            command: 'push'
            packagesToPush: '$(Build.ArtifactStagingDirectory)/packages/components/*.nupkg'
            publishVstsFeed: '$(feedProject)/$(feedName)'
            allowPackageConflicts: true


